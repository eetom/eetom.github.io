<div class="avatar-group">
  <a href="../../index.html" class="header-logo">
    <img src="https://eetom.github.io/img/portfolio/thoughtful.png" alt="" class="hero-logo-avatar">
    OkayEric!
  </a>
  <div class="flex-center">
    <div class="horizontal-nav">
      <a href="../../portfolio/portfolio.html">/portfolio</a>
      <a href="../../lab/lab.html">/lab</a>
      <a href="../../notes/notes.html">/notes</a>
      <a href="../../img/images.html">/images</a>
      <a href="../../about/about.html">/about</a>
      <a class="closeout" href="#">Close Menu</a>
    </div>
    <div class="dropdown-nav">
      <button>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
    </div>
    <div>
      <input type="checkbox" class="checkbox" id="checkbox">
      <label for="checkbox" class="checkbox-label">
        <i class="material-icons moon" style="font-size: 16px;">dark_mode</i>
        <i class="material-icons sun" style="font-size: 16px;">light_mode</i>
        <span class="ball"></span>
      </label>
    </div>
  </div>
</div>
<!-- End header -->

<script>
  const toggleBtn = document.getElementById("checkbox");
  let darkMode = localStorage.getItem("dark-mode");

  const enableDarkMode = () => {
    document.body.classList.add("dark");
    localStorage.setItem("dark-mode", "dark");
  };

  const disableDarkMode = () => {
    document.body.classList.remove("dark");
    localStorage.setItem("dark-mode", "light");
  };

  if (darkMode === "dark") {
    document.getElementById("checkbox").checked = true;
    enableDarkMode();
  } else {
    document.getElementById("checkbox").checked = false;
    disableDarkMode();
  }

  toggleBtn.addEventListener("click", (e) => {
    darkMode = localStorage.getItem("dark-mode");
    if (darkMode === "light") {
      enableDarkMode();
    } else {
      disableDarkMode();
    }
    document.body.classList.toggle("dark", toggleBtn.checked);
  });

  const dropdown = document.querySelector(".dropdown-nav");
  const closemenu = document.querySelector(".closeout");
  const horizontal = document.querySelector(".horizontal-nav");

  dropdown.addEventListener("click", mobileMenu);
  closemenu.addEventListener("click", hideMenu);

  function mobileMenu() {
    dropdown.classList.toggle("active");
    horizontal.classList.toggle("active");
  }

  function hideMenu() {
    dropdown.classList.toggle("active");
    horizontal.classList.toggle("active");
  }
</script>
